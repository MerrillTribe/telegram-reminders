name: Telegram Reminder

on:
  workflow_dispatch:
  schedule:
    # Runs every Wednesday at 6:30 PM Utah time (00:30 UTC Thursday)
    - cron: "30 0 * * 4"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.CHAT_ID }}" \
            -d "parse_mode=HTML" \
            --data-urlencode $'text=<b>📅 PACT Weekly Training Net Reminder</b>\n\nThe net will be held tonight at <b>2030hrs (8:30 PM)</b>.\n\nFrequency:\n<i>439.800 (Simplex)</i>\n\nWe look forward to hearing you on the air.'
